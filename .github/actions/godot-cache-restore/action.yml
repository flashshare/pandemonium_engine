# .github/actions/godot-cache-restore/action.yml
name: Restore Godot build cache
description: Restore the SCons cache directory.
inputs:
  cache-name:
    description: Base name for the cache (job name by default).
    default: "${{ github.job }}"
  scons-cache:
    description: Path to the SCons cache directory.
    default: "${{ github.workspace }}/.scons-cache/"
runs:
  using: "composite"
  steps:
    - name: Restore .scons-cache
      uses: actions/cache/restore@v4
      with:
        path: ${{ inputs.scons-cache }}
        # Primary key omits SHA so branch-level hits will occur
        key: ${{ inputs.cache-name }}-${{ env.GODOT_BASE_BRANCH }}-${{ github.ref }}
        # Fallback to base-branch only
        restore-keys: |
          ${{ inputs.cache-name }}-${{ env.GODOT_BASE_BRANCH }}-
