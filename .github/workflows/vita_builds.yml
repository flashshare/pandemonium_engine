name: 🎮 PSVita Builds

on: [push, pull_request]

env:
  GODOT_BASE_BRANCH: 3.x
  # SCons flags for incremental builds
  SCONSFLAGS: -Q --implicit-cache -j2 verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True

concurrency:
  group: vita-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04
    container: gnuton/vitasdk-docker:latest
    timeout-minutes: 180

    steps:
      # 1. Checkout code + submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 2. Cache SCons outputs (Docker persistent volume)
      - name: Cache SCons outputs
        uses: actions/cache@v4
        id: cache-build
        with:
          path: |
            .scons-cache
            temp-build
          key: vita-docker-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}
          restore-keys: |
            vita-docker-${{ runner.os }}-

      # 3. Setup Python & SCons (if not in container)
      - name: Install SCons
        run: |
          python3 -m pip install --upgrade scons==4.7.0
          scons --version

      # 4. Install PVR_PSP2 driver headers
      - name: Install PVR_PSP2 GPU driver
        run: |
          if [ ! -d "/vita-packages-extra" ]; then
            git clone https://github.com/isage/vita-packages-extra /vita-packages-extra
          fi
          cd /vita-packages-extra/pvr_psp2
          vita-makepkg
          vdpm *-arm.tar.xz

      # 5. Verify vita-elf-create supports relocation type 25
      - name: Verify vita-elf-create relocation support
        run: |
          echo "Testing vita-elf-create capabilities..."
          vita-elf-create --help || true
          
          # Create minimal test for relocation type 25
          cat > test_thumb.c << 'EOF'
          void target_func(void) {}
          void caller_func(void) { target_func(); }
          int main(void) { caller_func(); return 0; }
          EOF
          
          # Compile with Thumb-2 to generate R_ARM_THM_CALL
          arm-vita-eabi-gcc -march=armv7-a -mthumb -c test_thumb.c -o test_thumb.o
          arm-vita-eabi-gcc -march=armv7-a -mthumb test_thumb.o -o test_thumb.elf
          
          # Test vita-elf-create
          echo "Testing vita-elf-create with Thumb-2 relocations..."
          if vita-elf-create test_thumb.elf test_thumb.velf; then
            echo "✓ vita-elf-create supports relocation type 25"
          else
            echo "✗ vita-elf-create failed - may not support relocation type 25"
            echo "Attempting to inspect relocation types in test binary..."
            readelf -r test_thumb.elf || true
            exit 1
          fi

      # 6. Compile Godot for Vita
      - name: Compile Godot for Vita
        run: |
          echo "Starting Godot build with Docker VitaSDK..."
          scons platform=vita target=release tools=false ${{ env.SCONSFLAGS }}

      # 7. Save cache
      - name: Save SCons cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: vita-docker-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}

      # 8. Upload VELF artifact
      - name: Upload VELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release
          path: temp-build/vita_release.velf
          overwrite: true
