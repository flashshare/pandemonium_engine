#
# This workflow builds the PlayStation Vita export template for the Pandemonium engine.
# It uses the official vitasdk/setup-vitasdk action for a reliable and up-to-date toolchain.
#
name: 🎮 PSVita Builds
on: [push, pull_request]

# Global Settings
env:
  GODOT_BASE_BRANCH: 3.x
  SCONSFLAGS: verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True
  # The VITASDK env var is set automatically by the setup-vitasdk action.

concurrency:
  group: ci-${{ github.actor }}-${{ github.head_ref || github.run_number }}-${{ github.ref }}-vita
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    # Changed to the more stable and widely compatible ubuntu-22.04 runner.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Important: Ensures all engine submodules are checked out.

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        continue-on-error: true

      - name: Setup Python & SCons
        uses: ./.github/actions/godot-deps

      # This step uses the official, maintained action to set up the entire
      # VitaSDK toolchain, including necessary libraries like pvr_psp2.
      - name: Setup VitaSDK toolchain
        uses: vitasdk/setup-vitasdk@v4

      - name: Compile Godot for Vita
        uses: ./.github/actions/godot-build
        with:
          sconsflags: ${{ env.SCONSFLAGS }}
          platform: vita
          target: release
          tools: false

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ github.workflow }}-vita
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release
          path: bin/pandemonium.vita.opt.velf # The correct path for the final artifact
          if-no-files-found: error # Fail the workflow if the build artifact is missing

