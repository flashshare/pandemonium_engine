name: 🎮 PSVita Builds

on: [push, pull_request]

env:
  GODOT_BASE_BRANCH: 3.x
  VITASDK: /usr/local/vitasdk
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  SCONSFLAGS: -Q --implicit-cache -j2 verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True

concurrency:
  group: vita-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      # 1. Checkout code + submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 2. Cache VitaSDK installation
      - name: Cache VitaSDK installation
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/vitasdk
            /home/runner/vdpm
            /home/runner/vita-packages-extra
          key: vitasdk-fixed-${{ runner.os }}-v3
          restore-keys: |
            vitasdk-fixed-${{ runner.os }}-

      # 3. Cache SCons outputs
      - name: Cache SCons outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}
          restore-keys: |
            scons-${{ runner.os }}-

      # 4. Cache ccache
      - name: Cache compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-vita-${{ runner.os }}-

      # 5. Setup ccache
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # 6. Setup Python & SCons
      - name: Set up Python & SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: |
          python -m pip install --upgrade scons==4.7.0
          scons --version

      # 7. Install build dependencies and remove conflicting packages
      - name: Install build dependencies
        run: |
          sudo apt-get update
          # Remove ALL libelf packages that could interfere
          sudo apt-get purge -y libelf-dev libelf1 elfutils libelf0 || true
          sudo apt-get autoremove -y || true
          sudo apt-get install -y cmake libarchive-tools fakeroot zip git pkg-config xz-utils unzip build-essential

      # 8. Bootstrap VitaSDK with proper libelf handling (if cache miss)
      - name: Bootstrap VitaSDK with relocation fix
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          # Clone vdpm
          git clone https://github.com/vitasdk/vdpm /home/runner/vdpm
          cd /home/runner/vdpm
          
          # Ensure we're using the latest commit with relocation fixes
          git pull origin main
          
          # Bootstrap VitaSDK - this will build vita-elf-create with bundled libelf
          ./bootstrap-vitasdk.sh
          
          # Install base packages
          ./install-all.sh
          
          # Add to PATH for immediate use
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "/home/runner/vdpm" >> $GITHUB_PATH
          export PATH="$VITASDK/bin:/home/runner/vdpm:$PATH"
          
          # Force rebuild toolchain to ensure proper relocation support
          /home/runner/vdpm/vdpm -f vita-toolchain
          
          # Install essential Vita libraries
          /home/runner/vdpm/vdpm vita-rss-libdl

      # 9. Install PVR_PSP2 driver (if cache miss)
      - name: Install PVR_PSP2 GPU driver
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/isage/vita-packages-extra /home/runner/vita-packages-extra
          cd /home/runner/vita-packages-extra/pvr_psp2
          vita-makepkg
          vdpm *-arm.tar.xz

      # 10. Ensure PATH is set for cached installations
      - name: Setup VitaSDK environment
        run: |
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "/home/runner/vdpm" >> $GITHUB_PATH

      # 11. Test vita-elf-create relocation support
      - name: Test vita-elf-create relocation support
        run: |
          echo "Testing vita-elf-create..."
          vita-elf-create --help || true
          
          # Create a minimal test to verify relocation type 25 support
          echo "Creating test ARM binary with Thumb-2 calls..."
          cat > test_reloc.c << 'EOF'
          void func1(void) {}
          void func2(void) { func1(); }
          int main(void) { func2(); return 0; }
          EOF
          
          # Compile with Thumb-2 to generate R_ARM_THM_CALL relocations
          arm-vita-eabi-gcc -march=armv7-a -mthumb -c test_reloc.c -o test_reloc.o
          arm-vita-eabi-gcc -march=armv7-a -mthumb test_reloc.o -o test_reloc.elf
          
          # Test vita-elf-create with the binary
          echo "Testing vita-elf-create with Thumb-2 binary..."
          if vita-elf-create test_reloc.elf test_reloc.velf; then
            echo "✓ vita-elf-create successfully handles Thumb-2 relocations"
          else
            echo "✗ vita-elf-create failed - relocation type 25 not supported"
            exit 1
          fi

      # 12. Compile Godot for Vita
      - name: Compile Godot for Vita
        run: |
          echo "Starting Godot build with fixed VitaSDK..."
          scons platform=vita target=release tools=false ${{ env.SCONSFLAGS }}

      # 13. Always save caches
      - name: Save VitaSDK cache
        if: always() && steps.cache-vitasdk.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/vitasdk
            /home/runner/vdpm
            /home/runner/vita-packages-extra
          key: vitasdk-fixed-${{ runner.os }}-v3

      - name: Save SCons outputs
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}

      - name: Save compiler cache
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}

      # 14. Upload VELF artifact
      - name: Upload VELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release
          path: temp-build/vita_release.velf
          overwrite: true
