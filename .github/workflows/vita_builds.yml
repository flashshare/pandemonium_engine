name: 🎮 PSVita Builds

on: [push, pull_request]

env:
  GODOT_BASE_BRANCH: 3.x
  VITASDK: /usr/local/vitasdk
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  # SCons flags: enable implicit-dep cache and limit parallel jobs
  SCONSFLAGS: -Q --implicit-cache -j2 verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True

concurrency:
  group: vita-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      # 1. Checkout code + submodules (shallow)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 2. Cache VitaSDK install
      - name: Cache VitaSDK installation
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/vitasdk
            /home/runner/vdpm
            /home/runner/vita-packages-extra
          key: vitasdk-${{ runner.os }}-${{ hashFiles('.github/workflows/vita_builds.yml') }}
          restore-keys: |
            vitasdk-${{ runner.os }}-

      # 3. Cache SCons outputs
      - name: Cache SCons outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}
          restore-keys: |
            scons-${{ runner.os }}-

      # 4. Cache ccache
      - name: Cache compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-vita-${{ runner.os }}-

      # 5. Enable and configure ccache
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # 6. Install Python3 & SCons
      - name: Set up Python & SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: |
          python -m pip install --upgrade scons==4.7.0
          scons --version

      # 7. Install build tools
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get remove -y libelf-dev libelf1 || true
          sudo apt-get install -y cmake libarchive-tools fakeroot zip git pkg-config xz-utils unzip

      # 8. Bootstrap VitaSDK (if cache miss)
      - name: Bootstrap VitaSDK
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/vitasdk/vdpm /home/runner/vdpm
          cd /home/runner/vdpm
          ./bootstrap-vitasdk.sh
          ./install-all.sh
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "/home/runner/vdpm" >> $GITHUB_PATH

      # 9. Rebuild Vita toolchain & runtime libs
      - name: Rebuild Vita toolchain & libs
        run: |
          vdpm -f vita-toolchain
          vdpm vita-rss-libdl

      # 10. Install PVR_PSP2 driver (if cache miss)
      - name: Install PVR_PSP2 GPU driver
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/isage/vita-packages-extra /home/runner/vita-packages-extra
          cd /home/runner/vita-packages-extra/pvr_psp2
          vita-makepkg
          vdpm *-arm.tar.xz

      # 11. Verify vita-elf-create support
      - name: Verify vita-elf-create
        run: |
          echo "Checking vita-elf-create relocation support..."
          vita-elf-create --help || true
          strings $VITASDK/bin/vita-elf-create | grep -E "R_ARM_THM_CALL|Invalid relocation" || echo "Support OK"

      # 12. Compile Godot for Vita
      - name: Compile Godot for Vita
        run: |
          echo "Starting Godot build..."
          scons platform=vita target=release tools=false ${{ env.SCONSFLAGS }}

      # 13. Always save SCons cache
      - name: Save SCons outputs
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}

      # 14. Always save ccache
      - name: Save compiler cache
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}

      # 15. Upload VELF artifact
      - name: Upload VELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release
          path: temp-build/vita_release.velf
          overwrite: true
