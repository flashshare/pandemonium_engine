name: 🎮 PSVita Builds

on:
  push:
  pull_request:

env:
  GODOT_BASE_BRANCH: 3.x
  SCONSFLAGS: verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True
  VITASDK: /usr/local/vitasdk

concurrency:
  group: ci-${{ github.actor }}-${{ github.head_ref || github.run_number }}-${{ github.ref }}-vita
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Godot build cache
        uses: ./.github/actions/godot-cache-restore
        continue-on-error: true

      - name: Setup Python & SCons
        uses: ./.github/actions/godot-deps

      - name: Install & bootstrap VitaSDK
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libarchive-tools fakeroot zip git pkg-config
          # Clone VDPM (Vita SDK package manager + vita-makepkg source)
          git clone https://github.com/vitasdk/vdpm $HOME/vdpm
          cd $HOME/vdpm
          ./bootstrap-vitasdk.sh    # pulls down and installs vita-makepkg & core SDK
          ./install-all.sh          # installs all common packages into /usr/local/vitasdk
          # Persist the VitaSDK tools to ALL following steps:
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "$HOME/vdpm/vita-makepkg" >> $GITHUB_PATH

      - name: Install Vita host toolchain & PS Vita libraries
        run: |
          # Now `vdpm` and `vita-makepkg` are in $PATH:
          vdpm vita-toolchain      # latest compiler, vita-elf-create, etc.
          vdpm vita-rss-libdl      # essential Vita libc stubs
          vdpm pvr_psp2            # PVR2D driver headers + stubs

      - name: Compile Godot for Vita
        uses: ./.github/actions/godot-build
        with:
          sconsflags: ${{ env.SCONSFLAGS }}
          platform: vita
          target: release
          tools: false

      - name: Save Godot build cache
        uses: ./.github/actions/godot-cache-save
        with:
          cache-name: ${{ github.workflow }}-vita
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release
          path: temp-build/vita_release.velf
          overwrite: true
