name: 🎮 PSVita Builds

on: [push, pull_request]

env:
  GODOT_BASE_BRANCH: 3.x
  VITASDK: /usr/local/vitasdk
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  # Solution 1: Use YAML literal block scalar to preserve exact formatting
  SCONSFLAGS: |
    -Q --implicit-cache -j2 verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=True CXXFLAGS="-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables" CCFLAGS="-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables" LINKFLAGS="-Wl,--no-eh-frame-hdr"

concurrency:
  group: vita-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vita-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04
    timeout-minutes: 300

    steps:
      # 1. Checkout code + submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 2. Cache VitaSDK installation
      - name: Cache VitaSDK installation
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/vitasdk
            /home/runner/vdpm
            /home/runner/vita-packages-extra
          key: vitasdk-manual-${{ runner.os }}-v6
          restore-keys: |
            vitasdk-manual-${{ runner.os }}-

      # 3. Cache SCons outputs
      - name: Cache SCons outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}
          restore-keys: |
            scons-${{ runner.os }}-

      # 4. Cache ccache
      - name: Cache compiler cache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-vita-${{ runner.os }}-

      # 5. Setup ccache
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # 6. Setup Python & SCons
      - name: Set up Python & SCons
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: |
          python -m pip install --upgrade scons==4.7.0
          scons --version

      # 7. Install build dependencies
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libarchive-tools fakeroot zip git pkg-config xz-utils unzip

      # 8. Bootstrap VitaSDK (if cache miss)
      - name: Bootstrap VitaSDK
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          # Clone vdpm (using master branch)
          git clone https://github.com/vitasdk/vdpm /home/runner/vdpm
          cd /home/runner/vdpm
          
          # Bootstrap VitaSDK
          ./bootstrap-vitasdk.sh
          ./install-all.sh
          
          # Add to PATH for immediate use
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "/home/runner/vdpm" >> $GITHUB_PATH

      # 9. Install additional Vita packages
      - name: Install Vita packages
        run: |
          # Install runtime libraries
          /home/runner/vdpm/vdpm vita-rss-libdl

      # 10. Install PVR_PSP2 driver (if cache miss)
      - name: Install PVR_PSP2 GPU driver
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/isage/vita-packages-extra /home/runner/vita-packages-extra
          cd /home/runner/vita-packages-extra/pvr_psp2
          vita-makepkg
          vdpm *-arm.tar.xz

      # 11. Ensure PATH is set for cached installations
      - name: Setup VitaSDK environment
        run: |
          echo "$VITASDK/bin" >> $GITHUB_PATH
          echo "/home/runner/vdpm" >> $GITHUB_PATH

      # 12. Verify compiler flags and build environment
      - name: Verify build environment
        run: |
          echo "=== Compiler Version ==="
          arm-vita-eabi-gcc --version
          echo "=== Build Flags ==="
          echo "SCONSFLAGS: $SCONSFLAGS"
          echo "=== VitaSDK Path ==="
          echo "VITASDK: $VITASDK"
          ls -la $VITASDK/bin/ | head -10

      # 13. Compile Godot for Vita - SOLUTION 1: Using Step-Level Environment Variables
      - name: Compile Godot for Vita (Method 1 - Step Environment)
        env:
          # Define compiler flags as separate step-level environment variables
          VITA_CXXFLAGS: "-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables"
          VITA_CCFLAGS: "-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables"
          VITA_LINKFLAGS: "-Wl,--no-eh-frame-hdr"
        run: |
          echo "Starting Godot build (Method 1)..."
          
          # Set additional environment variables to ensure flags are applied
          export CC="arm-vita-eabi-gcc"
          export CXX="arm-vita-eabi-g++"
          export AR="arm-vita-eabi-ar"
          export RANLIB="arm-vita-eabi-ranlib"
          export STRIP="arm-vita-eabi-strip"
          
          # Build with properly separated arguments - no eval needed
          scons platform=vita target=release tools=false \
            -Q --implicit-cache -j2 verbose=no warnings=no werror=no \
            debug_symbols=no use_rtti=True disable_gles3=True \
            CXXFLAGS="$VITA_CXXFLAGS" \
            CCFLAGS="$VITA_CCFLAGS" \
            LINKFLAGS="$VITA_LINKFLAGS"
          
          # Verify the final binary exists
          if [ -f "temp-build/vita_release.velf" ]; then
            echo "✅ Build successful! VELF file created."
            ls -la temp-build/vita_release*
          else
            echo "❌ Build failed! VELF file not found."
            exit 1
          fi

      # 14. Alternative Method - Using Here Document for Complex Arguments
      - name: Compile Godot for Vita (Method 2 - Here Document)
        if: failure() # Only run if Method 1 fails
        run: |
          echo "Starting Godot build (Method 2 - Fallback)..."
          
          # Set compiler environment
          export CC="arm-vita-eabi-gcc"
          export CXX="arm-vita-eabi-g++"
          export AR="arm-vita-eabi-ar"
          export RANLIB="arm-vita-eabi-ranlib"
          export STRIP="arm-vita-eabi-strip"
          
          # Create a temporary script with exact arguments
          cat > build_script.sh << 'EOF'
          #!/bin/bash
          scons platform=vita target=release tools=false \
            -Q --implicit-cache -j2 verbose=no warnings=no werror=no \
            debug_symbols=no use_rtti=True disable_gles3=True \
            CXXFLAGS="-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables" \
            CCFLAGS="-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables" \
            LINKFLAGS="-Wl,--no-eh-frame-hdr"
          EOF
          
          chmod +x build_script.sh
          ./build_script.sh
          
          # Cleanup
          rm build_script.sh
          
          # Verify the final binary exists
          if [ -f "temp-build/vita_release.velf" ]; then
            echo "✅ Build successful! VELF file created."
            ls -la temp-build/vita_release*
          else
            echo "❌ Build failed! VELF file not found."
            exit 1
          fi

      # 15. Validate output and create backup
      - name: Validate and backup build artifacts
        run: |
          # Create backup of successful build
          mkdir -p build-artifacts
          
          if [ -f "temp-build/vita_release.velf" ]; then
            cp temp-build/vita_release.velf build-artifacts/
            echo "✅ VELF file backed up successfully"
            
            # Display file information
            echo "=== Build Artifacts ==="
            ls -la build-artifacts/
            file build-artifacts/vita_release.velf
          fi
          
          # Log build completion
          echo "=== Build Summary ==="
          echo "Build completed at: $(date)"

      # 16. Always save caches (even on failure for debugging)
      - name: Save VitaSDK cache
        if: always() && steps.cache-vitasdk.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/vitasdk
            /home/runner/vdpm
            /home/runner/vita-packages-extra
          key: vitasdk-manual-${{ runner.os }}-v6

      - name: Save SCons outputs
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: scons-${{ runner.os }}-${{ hashFiles('platform/vita/**','core/**','drivers/**','SConstruct') }}

      - name: Save compiler cache
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-vita-${{ runner.os }}-${{ github.ref }}

      # 17. Upload artifacts with error recovery
      - name: Upload VELF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: godot-vita-release-${{ github.sha }}
          path: |
            temp-build/vita_release.velf
            build-artifacts/
          retention-days: 30
          overwrite: true
          
      # 18. Debug information on failure
      - name: Debug build failure
        if: failure()
        run: |
          echo "=== Build Failed - Debug Information ==="
          echo "Last 50 lines of build output:"
          tail -n 50 .scons-cache/scons.log 2>/dev/null || echo "No SCons log found"
          
          echo "=== Checking for common issues ==="
          echo "VitaSDK installation:"
          ls -la $VITASDK/ || echo "VitaSDK not found"
          
          echo "Compiler availability:"
          which arm-vita-eabi-gcc || echo "Compiler not in PATH"
          
          echo "Environment variables:"
          env | grep -E "(VITA|SCONS|CC)" || echo "No relevant env vars"
          
          echo "=== Temp build directory ==="
          ls -la temp-build/ 2>/dev/null || echo "No temp-build directory"
          
          echo "=== SCons debug information ==="
          scons --help 2>/dev/null | head -20 || echo "SCons not available"
