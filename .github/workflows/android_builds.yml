name: 🤖 Android Builds

# Manually triggered only
on:
  workflow_dispatch:

env:
  # Cache key branch; bump to force clean build
  GODOT_BASE_BRANCH: 3.x
  # SCons flags: implicit-dependency cache + limited parallelism
  SCONSFLAGS: -Q --implicit-cache -j2 verbose=no warnings=no werror=no debug_symbols=no use_rtti=True disable_gles3=False
  # ccache configuration
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-template:
    name: Template (target=release, tools=no)
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      # 1. Checkout repository + submodules
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # 2. Restore SCons cache
      - name: Restore Godot build cache
        uses: actions/cache@v4
        id: cache-build
        with:
          path: |
            .scons-cache
            temp-build
          key: android-scons-${{ runner.os }}-${{ hashFiles('platform/android/**','core/**','drivers/**','SConstruct') }}
          restore-keys: |
            android-scons-${{ runner.os }}-

      # 3. Restore ccache
      - name: Restore ccache
        uses: actions/cache@v4
        id: cache-ccache
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-android-${{ runner.os }}-${{ github.ref }}
          restore-keys: |
            ccache-android-${{ runner.os }}-

      # 4. Enable ccache
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 2G

      # 5. Set up Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 6. Set up Python
      - name: Setup Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 7. Install SCons
      - name: Install SCons
        run: |
          python -m pip install --upgrade scons==4.7.0
          scons --version

      # 8. Install any additional tools
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config

      # 9. Compile armv7 export
      - name: Compile (armv7)
        run: |
          echo "Building Android armv7 export..."
          scons platform=android android_arch=armv7 target=release tools=false ${{ env.SCONSFLAGS }}

      # 10. Compile arm64v8 export
      - name: Compile (arm64v8)
        run: |
          echo "Building Android arm64v8 export..."
          scons platform=android android_arch=arm64v8 target=release tools=false ${{ env.SCONSFLAGS }}

      # 11. Generate Java templates via Gradle
      - name: Generate Android templates
        run: |
          cd platform/android/java
          chmod +x gradlew
          ./gradlew generatePandemoniumTemplates
          cd ../../..
          ls -l bin/

      # 12. Save SCons cache (even if build fails)
      - name: Save Godot build cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            .scons-cache
            temp-build
          key: android-scons-${{ runner.os }}-${{ hashFiles('platform/android/**','core/**','drivers/**','SConstruct') }}

      # 13. Save ccache (even if build fails)
      - name: Save ccache
        if: always()
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-android-${{ runner.os }}-${{ github.ref }}

      # 14. Upload export templates
      - name: Upload Android export templates
        uses: actions/upload-artifact@v4
        with:
          name: godot-android-export-templates
          path: |
            temp-build/android_release_armv7.*
            temp-build/android_release_arm64v8.*
          overwrite: true
